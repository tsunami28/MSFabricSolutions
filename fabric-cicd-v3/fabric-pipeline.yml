# fabric-pipeline.yml

trigger: none

pr: none

schedules:
  - cron: "00 5 * * *"
    displayName: Daily Execution
    branches:
      include:
        - main
    always: true

parameters:
  - name: devOpsManagedPoolUse
    displayName: Use Managed DevOps Pool
    type: boolean
    default: false
  - name: devOpsAgentImage
    displayName: DevOps Agent Image
    type: string
    default: "ubuntu-latest"
    values:
      - "ubuntu-latest"
      - "windows-latest"
  - name: whatIf
    displayName: Deployment Validation (What-If)
    type: boolean
    default: false
  - name: deployDev
    displayName: Deploy Dev Environment
    type: boolean
    default: true
  - name: deployTst
    displayName: Deploy Test Environment
    type: boolean
    default: true
  - name: deployPrd
    displayName: Deploy Production Environment
    type: boolean
    default: true

variables:
  - group: project-variables
  - group: fabric-variables
  - name: devOpsPoolName
    value: "mgmt-necp01-weu-azdo-mdp-default"

resources:
  repositories:
    - repository: sources
      type: git
      name: ccoe/sources
      ref: refs/heads/main
    - repository: fabric-analytics-platform-prd
      type: git
      name: ndpl/fabric-analytics-platform
      ref: refs/heads/main
    - repository: fabric-analytics-platform-tst
      type: git
      name: ndpl/fabric-analytics-platform
      ref: refs/heads/test
    - repository: fabric-analytics-platform-dev
      type: git
      name: ndpl/fabric-analytics-platform
      ref: refs/heads/dev

stages:
  # ── Validate ─────────────────────────────────────────────────────────────────
  - stage: Validate
    displayName: "🔍 Validate configuration"
    dependsOn: []
    jobs:
      - job: ValidateConfigs
        displayName: "Validate all YAML configs"
        pool:
          ${{ if eq(parameters.devOpsManagedPoolUse, true) }}:
            name: $(devOpsPoolName)
          ${{ if eq(parameters.devOpsManagedPoolUse, false) }}:
            vmImage: ${{ parameters.devOpsAgentImage }}
        steps:
          - checkout: self

          - template: ci/steps/install-prerequisites.yml

          # Recursive tree view (install tree first on Ubuntu agents)
          - script: find $(Pipeline.Workspace) -maxdepth 2 -type d
            displayName: List repo folder structure
            enabled: false

          - task: PowerShell@2
            displayName: "Validate dev config"
            inputs:
              pwsh: true
              targetType: inline
              script: |
                . "$(Build.SourcesDirectory)/scripts/helpers/Read-EnvironmentConfig.ps1"
                $null = Read-EnvironmentConfig -ConfigPath "$(Build.SourcesDirectory)/parameters/necp01/weu/dev/dev.yml"
                Write-Host "dev.yml - OK"

          - task: PowerShell@2
            displayName: "Validate tst config"
            inputs:
              pwsh: true
              targetType: inline
              script: |
                . "$(Build.SourcesDirectory)/scripts/helpers/Read-EnvironmentConfig.ps1"
                $null = Read-EnvironmentConfig -ConfigPath "$(Build.SourcesDirectory)/parameters/necp01/weu/tst/tst.yml"
                Write-Host "tst.yml - OK"

          - task: PowerShell@2
            displayName: "Validate prd config"
            inputs:
              pwsh: true
              targetType: inline
              script: |
                . "$(Build.SourcesDirectory)/scripts/helpers/Read-EnvironmentConfig.ps1"
                $null = Read-EnvironmentConfig -ConfigPath "$(Build.SourcesDirectory)/parameters/necp01/weu/prd/prd.yml"
                Write-Host "prd.yml - OK"

  # ── DEV ──────────────────────────────────────────────────────────────────────
  - stage: Deploy_Dev
    displayName: "🚀 Deploy - dev"
    dependsOn: Validate
    condition: |
      and(
        succeeded('Validate'),
        eq('${{ parameters.deployDev }}', 'true')
      )
    jobs:
      - deployment: DeployDev
        displayName: "Deploy to dev"
        pool:
          ${{ if eq(parameters.devOpsManagedPoolUse, true) }}:
            name: $(devOpsPoolName)
          ${{ if eq(parameters.devOpsManagedPoolUse, false) }}:
            vmImage: ${{ parameters.devOpsAgentImage }}
        environment: necp01
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - checkout: fabric-analytics-platform-dev
                - checkout: sources

                - template: ci/steps/install-prerequisites.yml

                - template: ci/steps/deploy-capacity.yml
                  parameters:
                    connectedServiceName: $(connectedServiceName)
                    environmentName: dev
                    whatIf: ${{ parameters.whatIf }}

                - template: ci/steps/deploy-environment.yml
                  parameters:
                    environment: dev
                    clientId: $(ndpl-necp01-fdev-spn-id)
                    clientSecret: $(ndpl-necp01-fdev-spn-secret)
                    tenantId: $(fabricTenantId)
                    subscriptionId: $(subscriptionId)
                    templateFile: "$(build.SourcesDirectory)/sources/infrastructure-as-code/mainTemplates/deployFabricWorkspaceInfra.bicep"
                    resourceGroupName: $(devResourceGroupName)
                    connectedServiceName: $(connectedServiceName)

                - template: ci/steps/validate-deployment.yml
                  parameters:
                    environment: dev
                    workspaceMapFile: $(DeployFabric.WorkspaceMapFile)
                    clientId: $(ndpl-necp01-fdev-spn-id)
                    clientSecret: $(ndpl-necp01-fdev-spn-secret)
                    tenantId: $(fabricTenantId)

  # ── TST ──────────────────────────────────────────────────────────────────────
  - stage: Deploy_Tst
    displayName: "🚀 Deploy - tst"
    dependsOn: Validate
    condition: |
      and(
        succeeded('Validate'),
        eq('${{ parameters.deployTst }}', 'true')
      )
    jobs:
      - deployment: DeployTst
        displayName: "Deploy to tst"
        pool:
          ${{ if eq(parameters.devOpsManagedPoolUse, true) }}:
            name: $(devOpsPoolName)
          ${{ if eq(parameters.devOpsManagedPoolUse, false) }}:
            vmImage: ${{ parameters.devOpsAgentImage }}
        environment: necp01
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - checkout: fabric-analytics-platform-tst
                - checkout: sources

                - template: ci/steps/install-prerequisites.yml

                - template: ci/steps/deploy-capacity.yml
                  parameters:
                    connectedServiceName: $(connectedServiceName)
                    environmentName: tst
                    whatIf: ${{ parameters.whatIf }}

                - template: ci/steps/deploy-environment.yml
                  parameters:
                    environment: tst
                    clientId: $(ndpl-necp01-ftst-spn-id)
                    clientSecret: $(ndpl-necp01-ftst-spn-secret)
                    tenantId: $(fabricTenantId)
                    subscriptionId: $(subscriptionId)
                    templateFile: "$(Build.SourcesDirectory)/sources/infrastructure-as-code/mainTemplates/deployFabricWorkspaceInfra.bicep"
                    resourceGroupName: $(tstResourceGroupName)
                    connectedServiceName: $(connectedServiceName)

                - template: ci/steps/validate-deployment.yml
                  parameters:
                    environment: tst
                    workspaceMapFile: $(DeployFabric.WorkspaceMapFile)
                    clientId: $(ndpl-necp01-ftst-spn-id)
                    clientSecret: $(ndpl-necp01-ftst-spn-secret)
                    tenantId: $(fabricTenantId)

  # ── PRD ──────────────────────────────────────────────────────────────────────
  - stage: Deploy_Prd
    displayName: "🚀 Deploy - prd"
    dependsOn: Validate
    condition: |
      and(
        succeeded('Validate'),
        eq('${{ parameters.deployPrd }}', 'true')
      )
    jobs:
      - deployment: DeployPrd
        displayName: "Deploy to prd"
        pool:
          ${{ if eq(parameters.devOpsManagedPoolUse, true) }}:
            name: $(devOpsPoolName)
          ${{ if eq(parameters.devOpsManagedPoolUse, false) }}:
            vmImage: ${{ parameters.devOpsAgentImage }}
        environment: necp01
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - checkout: fabric-analytics-platform-prd
                - checkout: sources

                - template: ci/steps/install-prerequisites.yml

                - template: ci/steps/deploy-capacity.yml
                  parameters:
                    connectedServiceName: $(connectedServiceName)
                    environmentName: prd
                    whatIf: ${{ parameters.whatIf }}

                - template: ci/steps/deploy-environment.yml
                  parameters:
                    environment: prd
                    clientId: $(ndpl-necp01-fprd-spn-id)
                    clientSecret: $(ndpl-necp01-fprd-spn-secret)
                    tenantId: $(fabricTenantId)
                    subscriptionId: $(subscriptionId)
                    templateFile: "$(Build.SourcesDirectory)/sources/infrastructure-as-code/mainTemplates/deployFabricWorkspaceInfra.bicep"
                    resourceGroupName: $(prdResourceGroupName)
                    connectedServiceName: $(connectedServiceName)

                - template: ci/steps/validate-deployment.yml
                  parameters:
                    environment: prd
                    workspaceMapFile: $(DeployFabric.WorkspaceMapFile)
                    clientId: $(ndpl-necp01-fprd-spn-id)
                    clientSecret: $(ndpl-necp01-fprd-spn-secret)
                    tenantId: $(fabricTenantId)
