# validate-deployment.yml
# ─────────────────────────────────────────────────────────────────────────────
# Pipeline step template: runs post-deployment validation and publishes
# NUnit XML results to the Azure DevOps Tests tab.
#
# Parameters:
#   environment      - target environment name (dev | tst | prd)
#   configFile       - relative path to the environment YAML config (optional)
#   workspaceMapFile - path to workspace-map.json from DeployFabric output variable
#   clientId         - Entra application (client) ID           [secret]
#   clientSecret     - Entra application client secret         [secret]
#   tenantId         - Azure AD tenant ID
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: environment
    type: string
    values: [dev, tst, prd]

  - name: configFile
    type: string
    default: "" # resolved below if empty

  - name: workspaceMapFile
    type: string
    default: "" # populated from DeployFabric.WorkspaceMapFile output variable

  - name: clientId
    type: string
    default: ""

  - name: clientSecret
    type: string
    default: ""

  - name: tenantId
    type: string
    default: ""

steps:
  # Recursive tree view (install tree first on Ubuntu agents)
  - script: find $(Pipeline.Workspace) -maxdepth 2 -type d
    displayName: List repo folder structure
    enabled: false

  - task: PowerShell@2
    enabled: true
    displayName: "Validate ${{ parameters.environment }} deployment"
    inputs:
      filePath: "$(Build.SourcesDirectory)/fabric-infra/scripts/main/Validate-Deployment.ps1"
      pwsh: true
      arguments: >-
        -ConfigFile       "$(Build.SourcesDirectory)/fabric-infra/parameters/necp01/weu/${{ parameters.environment }}/"
        -Environment      "${{ parameters.environment }}"
        -ClientId         "${{ parameters.clientId }}"
        -ClientSecret     "${{ parameters.clientSecret }}"
        -TenantId         "${{ parameters.tenantId }}"
        -WorkspaceMapFile "${{ parameters.workspaceMapFile }}"
        -OutputPath       "$(Build.ArtifactStagingDirectory)/validation-${{ parameters.environment }}"
    continueOnError: true # publish results even when validation fails

  - task: PublishTestResults@2
    displayName: "Publish validation results - ${{ parameters.environment }}"
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: "NUnit"
      testResultsFiles: |
        $(Build.ArtifactStagingDirectory)/validation-${{ parameters.environment }}/*.xml
      testRunTitle: "Fabric Deployment Validation - ${{ parameters.environment }}"
      failTaskOnFailedTests: true
