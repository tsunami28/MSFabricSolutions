environment: dev
capacityName: ndplnecp01weufdevfcp
# ── Log Analytics ──────────────────────────────────────────────────────────────────────────────
# Azure Log Analytics Workspace for this environment.
# Deployed via Bicep (Deploy-LogAnalyticsInfra.ps1).
# Connected to Fabric workspaces via Power BI Admin API (Deploy-LogAnalytics.ps1).
logAnalytics:
  subscriptionId: "ff10c34a-8edb-4d5a-b37f-82e2b9cc0347"
  resourceGroupName: ndpl-necp01-weu-fdev-rsg
  workspaceName: ndpl-necp01-weu-fdev-law
  location: westeurope
  sku: PerGB2018                 # PerGB2018 (pay-as-you-go) | CapacityReservation
  retentionInDays: 90            # 30-730 days
  dailyQuotaGb: -1               # -1 = no cap; or a numeric daily ingest cap in GB
# ── Private Link Infrastructure (optional) ────────────────────────────────────
# Shared settings for PLS/PE deployment via Bicep.
# Per-workspace PLS/PE names are defined under each workspace's 'privateLink' block.
privateLinks:
  tenantId: "2f741536-f5f3-445f-b1a9-9d260038ca80"
  SubscriptionId: "ff10c34a-8edb-4d5a-b37f-82e2b9cc0347"
  subnetId: "/subscriptions/ff10c34a-8edb-4d5a-b37f-82e2b9cc0347/resourceGroups/ndpl-necp01-weu-ntwk-rsg/providers/Microsoft.Network/virtualNetworks/ndpl-necp01-weu-ntwk-vnt/subnets/FabricDevSubnet"
  privateDnsZoneId: "/subscriptions/e0cda8cb-4a9b-413e-9ab9-a3732f46fbd4/resourceGroups/mgmt-necp01-weu-ntwk-rsg/providers/Microsoft.Network/privateDnsZones/privatelink.fabric.microsoft.com"
  location: westeurope
  resourceGroupName: ndpl-necp01-weu-fdev-rsg # can also be passed via -ResourceGroupName

# ── VNet Data Gateways ────────────────────────────────────────────────────────
# Managed gateways that allow Fabric workloads to securely connect to data
# sources within an Azure Virtual Network.
gateways:
  - name: ndpl-necp01-weu-fdev-vnet-gw
    capacityName: ndplnecp01weufdevfcp       # Fabric capacity for billing
    subscriptionId: "ff10c34a-8edb-4d5a-b37f-82e2b9cc0347"
    resourceGroupName: ndpl-necp01-weu-ntwk-rsg
    virtualNetworkName: ndpl-necp01-weu-ntwk-vnt
    subnetName: FabricDevGatewaySubnet
    inactivityMinutesBeforeSleep: 30        # 30|60|90|120|150|240|360|480|720|1440
    numberOfMemberGateways: 2                # 1-9
    roles:
      - identity: "a2ae4cfb-3aea-45b1-80da-9e231959c755"  # ndpl-necp01-weu-fbrc_dev-admin - Group
        role: Admin
      - identity: "bc567124-414b-4f37-9b09-eec3af933add" # ndpl-necp01-sub-spn
        role: Admin
      - identity: "c2017801-1951-4d78-acd8-b3685b18a564"  # ndpl-necp01-weu-fbrc_dev-developer
        role: ConnectionCreator
      - identity: "8464cf43-6605-46ac-a6cd-717f2ecf138d" # ndpl-necp01-fabric-admin - Group
        role: Admin

# ── Workspaces ────────────────────────────────────────────────────────────────
workspaces:
  - name: FIN-Core-Dev
    description: Finance core development workspace
    logAnalytics: true            # Connect to environment-level Log Analytics Workspace
    capacityOverride: null # Optional: overrides capacityName for this workspace only

    # ── Git Integration (optional) ─────────────────────────────────────────────
    # Connects this workspace to a Git repository branch.
    # Supported providers: AzureDevOps | GitHub
    # Use connectionId (Fabric Connection GUID) when deploying via SPN/MI.
    # Set to false to explicitly disconnect the workspace from Git.
    #
    gitIntegration:
      provider: AzureDevOps
      organizationName: necnl
      projectName: ndpl
      repositoryName: fabric-analytics-platform
      branchName: dev
      directoryName: FIN-Core-Dev.Workspace   # relative path in the repo
      connectionId: "60041f73-d100-4bb9-8ca1-c0585b12feb0"  # required for SPN/MI auth
      initializationStrategy: PreferRemote     # None | PreferRemote | PreferWorkspace
      conflictResolutionPolicy: PreferRemote   # PreferRemote | PreferWorkspace
      allowOverrideItems: true

    # Path relative to repository root where Fabric item files live.
    # Must follow the Fabric Git Integration folder structure:
    #   <workspace-name>.Workspace/<item-name>.<ItemType>/
    items:
      repository_directory: fabric-analytics-platform/FIN-Core-Dev.Workspace

      # Optional: restrict which Fabric item types are deployed.
      # Omit to deploy all supported types found in repository_directory.
      # item_types_in_scope:

      # Optional: environment-specific value substitutions applied by fab deploy.
      # find_value is replaced with replace_value in all deployed item definitions.
      parameters:
        find_replace:
          # - find_value: "PLACEHOLDER_LAKEHOUSE_ID"
          #   replace_value: "00000000-0000-0000-0000-000000000000"
          # - find_value: "PLACEHOLDER_SQL_ENDPOINT"
          #   replace_value: "dev-server.datawarehouse.fabric.microsoft.com"

    # Desired RBAC state. Assignments are additive by default.
    # Set remove: true on an entry to explicitly revoke that assignment.
    # Identity chould be Entra Object ID of a User, Group, or Service Principal.
    # Principal types supported: User, Group, ServicePrincipal.
    # Role definitions supported: Admin, Member, Contributor, Viewer.
    roles:
      - identity: "da5b8c7e-02d9-4291-8377-c4c1dfc33f5d" # [FA] Milos Katinski
        principalType: User
        role: Admin
      - identity: "8464cf43-6605-46ac-a6cd-717f2ecf138d" # ndpl-necp01-fabric-admin - required for workspace management via Bicep
        principalType: Group
        role: Admin
      - identity: "bc567124-414b-4f37-9b09-eec3af933add" # ndpl-necp01-sub-spn - required for PLS/PE deployment via Bicep
        principalType: ServicePrincipal
        role: Admin
      - identity: "a2ae4cfb-3aea-45b1-80da-9e231959c755" # ndpl-necp01-weu-fbrc_dev-admin
        principalType: Group
        role: Admin
      - identity: "c2017801-1951-4d78-acd8-b3685b18a564" # ndpl-necp01-weu-fbrc_dev-developer
        principalType: Group
        role: Member
      - identity: "99744186-2ff3-4c00-b353-e8e387c84b10" # ndpl-necp01-weu-fbrc_dev-reader
        principalType: Group
        role: Viewer

    # Optional: Private Link Service + Private Endpoint for this workspace.
    # Requires the top-level 'privateLinks' section to be configured.
    privateLink:
      plsName: ndpl-necp01-weu-fdev-fin-core-pls
      peResourceName: ndpl-necp01-weu-fdev-fin-core

  - name: FIN-Reporting-Dev
    description: Finance Reporting development workspace
    logAnalytics: true            # Connect to environment-level Log Analytics Workspace
    capacityOverride: null # Optional: overrides capacityName for this workspace only

    # ── Git Integration (optional) ─────────────────────────────────────────────
    # Connects this workspace to a Git repository branch.
    # Supported providers: AzureDevOps | GitHub
    # Use connectionId (Fabric Connection GUID) when deploying via SPN/MI.
    # Set to false to explicitly disconnect the workspace from Git.
    #
    gitIntegration:
      provider: AzureDevOps
      organizationName: necnl
      projectName: ndpl
      repositoryName: fabric-analytics-platform
      branchName: dev
      directoryName: FIN-Reporting-Dev.Workspace   # relative path in the repo
      connectionId: "60041f73-d100-4bb9-8ca1-c0585b12feb0"  # required for SPN/MI auth
      initializationStrategy: PreferRemote     # None | PreferRemote | PreferWorkspace
      conflictResolutionPolicy: PreferRemote   # PreferRemote | PreferWorkspace
      allowOverrideItems: true

    # Path relative to repository root where Fabric item files live.
    # Must follow the Fabric Git Integration folder structure:
    #   <workspace-name>.Workspace/<item-name>.<ItemType>/
    items:
      repository_directory: fabric-analytics-platform/FIN-Reporting-Dev.Workspace

      # Optional: restrict which Fabric item types are deployed.
      # Omit to deploy all supported types found in repository_directory.
      # item_types_in_scope:

      # Optional: environment-specific value substitutions applied by fab deploy.
      # find_value is replaced with replace_value in all deployed item definitions.
      parameters:
        find_replace:
          # - find_value: "PLACEHOLDER_LAKEHOUSE_ID"
          #   replace_value: "00000000-0000-0000-0000-000000000000"
          # - find_value: "PLACEHOLDER_SQL_ENDPOINT"
          #   replace_value: "dev-server.datawarehouse.fabric.microsoft.com"

    # Desired RBAC state. Assignments are additive by default.
    # Set remove: true on an entry to explicitly revoke that assignment.
    # Identity chould be Entra Object ID of a User, Group, or Service Principal.
    # Principal types supported: User, Group, ServicePrincipal.
    # Role definitions supported: Admin, Member, Contributor, Viewer.
    roles:
      - identity: "da5b8c7e-02d9-4291-8377-c4c1dfc33f5d" # [FA] Milos Katinski
        principalType: User
        role: Admin
      - identity: "8464cf43-6605-46ac-a6cd-717f2ecf138d" # ndpl-necp01-fabric-admin - required for workspace management via Bicep/FAB Cli
        principalType: Group
        role: Admin
      - identity: "bc567124-414b-4f37-9b09-eec3af933add" # ndpl-necp01-sub-spn - required for PLS/PE deployment via Bicep
        principalType: ServicePrincipal
        role: Admin
      - identity: "a2ae4cfb-3aea-45b1-80da-9e231959c755" # ndpl-necp01-weu-fbrc_dev-admin
        principalType: Group
        role: Admin
      - identity: "c2017801-1951-4d78-acd8-b3685b18a564" # ndpl-necp01-weu-fbrc_dev-developer
        principalType: Group
        role: Member
      - identity: "99744186-2ff3-4c00-b353-e8e387c84b10" # ndpl-necp01-weu-fbrc_dev-reader
        principalType: Group
        role: Viewer

    # Optional: Private Link Service + Private Endpoint for this workspace.
    # Requires the top-level 'privateLinks' section to be configured.
    privateLink:
      plsName: ndpl-necp01-weu-fdev-fin-reporting-pls
      peResourceName: ndpl-necp01-weu-fdev-fin-reporting
