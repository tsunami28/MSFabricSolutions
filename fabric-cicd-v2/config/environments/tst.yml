environment: tst
capacityName: FabricCapacity-Tst

workspaces:
  - name: Analytics-Tst
    description: Analytics test workspace
    capacityOverride: null

    items:
      repository_directory: artifacts/Analytics-Dev.Workspace  # Same source, different target workspace
      item_types_in_scope:
        - Notebook
        - DataPipeline
        - Lakehouse
        - Warehouse
        - Environment
        - SparkJobDefinition
      parameters:
        find_replace:
          - find_value: "PLACEHOLDER_LAKEHOUSE_ID"
            replace_value: "11111111-1111-1111-1111-111111111111"
          - find_value: "PLACEHOLDER_SQL_ENDPOINT"
            replace_value: "tst-server.datawarehouse.fabric.microsoft.com"

    roles:
      - identity: "00000000-0000-0000-0000-000000000001"
        principalType: Group
        role: Contributor
      - identity: "00000000-0000-0000-0000-000000000002"
        principalType: Group
        role: Admin
      - identity: "00000000-0000-0000-0000-000000000004"  # QA team
        principalType: Group
        role: Viewer

  - name: DataEngineering-Tst
    description: Data engineering test workspace

    items:
      repository_directory: artifacts/DataEngineering-Dev.Workspace
      item_types_in_scope:
        - Notebook
        - DataPipeline
        - Lakehouse
        - SparkJobDefinition
      parameters:
        find_replace:
          - find_value: "PLACEHOLDER_STORAGE_ACCOUNT"
            replace_value: "tststorageaccount"

    roles:
      - identity: "00000000-0000-0000-0000-000000000003"
        principalType: Group
        role: Member
