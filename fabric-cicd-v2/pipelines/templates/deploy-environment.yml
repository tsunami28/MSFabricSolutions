# deploy-environment.yml
# ─────────────────────────────────────────────────────────────────────────────
# Pipeline step template: executes Deploy-FabricEnvironment.ps1 for one env.
#
# Parameters:
#   environment       - target environment name (dev | tst | prd)
#   configFile        - relative path to the YAML environment config
#   clientId          - Entra application (client) ID           [secret]
#   clientSecret      - Entra application client secret         [secret]
#   tenantId          - Azure AD tenant ID                      [secret]
#   useManagedIdentity- set 'true' to use managed identity (overrides SP params)
#   scope             - deployment scope: all | workspaces | items | security
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: environment
    type: string
    values: [dev, tst, prd]

  - name: configFile
    type: string
    default: "" # resolved below if empty

  - name: clientId
    type: string
    default: ""

  - name: clientSecret
    type: string
    default: ""

  - name: tenantId
    type: string
    default: ""

  - name: useManagedIdentity
    type: boolean
    default: false

  - name: scope
    type: string
    default: "all"
    values: [all, workspaces, items, security, privatelinks]

  - name: subscriptionId
    type: string
    default: ""

  - name: templateFile
    type: string
    default: ""

  - name: resourceGroupName
    type: string
    default: ""

  - name: connectedServiceName
    type: string
    default: ""

steps:
  - task: PowerShell@2
    name: DeployFabric
    displayName: "Deploy Fabric - ${{ parameters.environment }}"
    env:
      # Expose secrets to the script as environment variables
      # (never pass secrets as plaintext arguments)
      FAB_CLIENT_SECRET: ${{ parameters.clientSecret }}
    inputs:
      filePath: "$(Build.SourcesDirectory)/fabric-cicd-v2/src/scripts/Deploy-FabricEnvironment.ps1"
      pwsh: true
      ${{ if eq(parameters.useManagedIdentity, true) }}:
        arguments: >-
          -ConfigFile  "$(Build.SourcesDirectory)/fabric-cicd-v2/${{ coalesce(parameters.configFile, format('config/environments/{0}.yml', parameters.environment)) }}"
          -Environment "${{ parameters.environment }}"
          -ClientId     "${{ parameters.clientId }}"
          -ClientSecret "${{ parameters.clientSecret }}"
          -TenantId     "${{ parameters.tenantId }}"
          -UseManagedIdentity
          -Scope       "${{ parameters.scope }}"
          -RepoRoot    "$(Build.SourcesDirectory)"
          -SubscriptionId "${{ parameters.subscriptionId }}"
          -TemplateFile "${{ parameters.templateFile }}"
          -ResourceGroupName "${{ parameters.resourceGroupName }}"
      ${{ else }}:
        arguments: >-
          -ConfigFile  "$(Build.SourcesDirectory)/fabric-cicd-v2/${{ coalesce(parameters.configFile, format('config/environments/{0}.yml', parameters.environment)) }}"
          -Environment "${{ parameters.environment }}"
          -ClientId     "${{ parameters.clientId }}"
          -ClientSecret "${{ parameters.clientSecret }}"
          -TenantId     "${{ parameters.tenantId }}"
          -Scope       "${{ parameters.scope }}"
          -RepoRoot    "$(Build.SourcesDirectory)"
          -SubscriptionId "${{ parameters.subscriptionId }}"
          -TemplateFile "${{ parameters.templateFile }}"
          -ResourceGroupName "${{ parameters.resourceGroupName }}"

  # ── Deploy Private Links (AzurePowerShell@5 - Az context from SPN) ──────────
  - task: AzurePowerShell@5
    displayName: "Deploy Private Links - ${{ parameters.environment }}"
    condition: and(succeeded(), ne('${{ parameters.connectedServiceName }}', ''), ne('${{ parameters.resourceGroupName }}', ''))
    inputs:
      pwsh: true
      azureSubscription: ${{ parameters.connectedServiceName }}
      azurePowerShellVersion: latestVersion
      ScriptType: FilePath
      ScriptPath: "$(Build.SourcesDirectory)/fabric-cicd-v2/src/scripts/Deploy-PrivateLinks.ps1"
      ScriptArguments: >-
        -ConfigFile       "$(Build.SourcesDirectory)/fabric-cicd-v2/${{ coalesce(parameters.configFile, format('config/environments/{0}.yml', parameters.environment)) }}"
        -WorkspaceMapFile "$(DeployFabric.WorkspaceMapFile)"
        -TemplateFile     "${{ parameters.templateFile }}"
        -ResourceGroupName "${{ parameters.resourceGroupName }}"
