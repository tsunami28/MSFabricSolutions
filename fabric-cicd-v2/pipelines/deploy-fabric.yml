# deploy-fabric.yml
# ─────────────────────────────────────────────────────────────────────────────
# Main Azure DevOps pipeline: deploys Microsoft Fabric resources across
# dev → tst → prd environments using the Fabric CLI (ms-fabric-cli).
#
# Variable groups (configure in ADO Library before running):
#
#   project-variables       - shared across all environments
#
# ADO Environments (configure approval gates in ADO):
#   fabric-dev             - no approval gate (auto-deploy on merge)
#   fabric-tst             - optional approval gate
#   fabric-prd             - REQUIRED approval gate before production
#
# Trigger: on changes to config/ or src/ under fabric-cicd-v2/
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - fabric-cicd-v2/config/**
      - fabric-cicd-v2/src/**

pr: none # CI validation pipeline - not triggered on PRs

schedules:
  - cron: "00 5 * * *" # UTC Timezone
    displayName: Daily Execution
    branches:
      include:
        - main
    always: true

# ── Parameters ───────────────────────────────────────────────────────────────
parameters:
  - name: devOpsManagedPoolUse
    displayName: Use Managed DevOps Pool
    type: boolean
    default: true
  - name: devOpsAgentImage
    displayName: DevOps Agent Image
    type: string
    default: "ubuntu-latest"
    values:
      - "ubuntu-latest"
      - "windows-latest"
  - name: whatIf
    displayName: Deployment Validation (What-If)
    type: boolean
    default: false
  - name: deployDev
    displayName: Deploy Dev Environment
    type: boolean
    default: true
  - name: deployTst
    displayName: Deploy Test Environment
    type: boolean
    default: false
  - name: deployPrd
    displayName: Deploy Production Environment
    type: boolean
    default: false

# ── Variable groups ────────────────────────────────────────────────────────────
variables:
  - group: project-variables
  - name: devOpsPoolName
    value: 'mgmt-necp01-weu-azdo-mdp-default'

# ── Resources ───────────────────────────────────────────────────────────────
resources:
  repositories:
    - repository: sources
      type: git
      name: ccoe/sources
      ref: refs/heads/main

# ── Stages ────────────────────────────────────────────────────────────────────
stages:
  # ────────────────────────────────────────────────────────────────────────────
  # Stage: Deploy Fabric Infrastructure (Capacity, Key Vault)
  # ────────────────────────────────────────────────────────────────────────────
  - template: templates/deploy-capacity.yml
    parameters:
      connectedServiceName: $(connectedServiceName)
      fabricServiceName: $(fdevServiceName)
      fabricTenantId: $(fabricTenantId)
      devOpsAgentImage: ${{ parameters.devOpsAgentImage }}
      devOpsManagedPoolUse: ${{ parameters.devOpsManagedPoolUse }}
      devOpsPoolName: $(devOpsPoolName)
      environmentName: dev
      whatIf: ${{ parameters.whatIf }}
      deployEnabled: ${{ parameters.deployDev }}
  - template: templates/deploy-capacity.yml
    parameters:
      connectedServiceName: $(connectedServiceName)
      fabricServiceName: $(ftstServiceName)
      fabricTenantId: $(fabricTenantId)
      devOpsAgentImage: ${{ parameters.devOpsAgentImage }}
      devOpsManagedPoolUse: ${{ parameters.devOpsManagedPoolUse }}
      devOpsPoolName: $(devOpsPoolName)
      environmentName: tst
      whatIf: ${{ parameters.whatIf }}
      deployEnabled: ${{ parameters.deployTst }}
  - template: templates/deploy-capacity.yml
    parameters:
      connectedServiceName: $(connectedServiceName)
      fabricServiceName: $(fprdServiceName)
      fabricTenantId: $(fabricTenantId)
      devOpsAgentImage: ${{ parameters.devOpsAgentImage }}
      devOpsManagedPoolUse: ${{ parameters.devOpsManagedPoolUse }}
      devOpsPoolName: $(devOpsPoolName)
      environmentName: prd
      whatIf: ${{ parameters.whatIf }}
      deployEnabled: ${{ parameters.deployPrd }}

  # ────────────────────────────────────────────────────────────────────────────
  # Stage: Validate - config syntax check before any deployment
  # ────────────────────────────────────────────────────────────────────────────
  - stage: Validate
    displayName: "🔍 Validate Configuration"
    jobs:
      - job: ValidateConfigs
        displayName: "Validate YAML configs"
        pool:
          ${{ if eq(parameters.devOpsManagedPoolUse, true) }}:
            name: $(devOpsPoolName)
          ${{ if eq(parameters.devOpsManagedPoolUse, false) }}:
            vmImage: ${{ parameters.devOpsAgentImage }}
        steps:
          - template: templates/install-prerequisites.yml

          - task: PowerShell@2
            displayName: "Validate dev config"
            inputs:
              pwsh: true
              targetType: inline
              script: |
                . "$(Build.SourcesDirectory)/fabric-cicd-v2/src/helpers/Read-EnvironmentConfig.ps1"
                $null = Read-EnvironmentConfig -ConfigPath "$(Build.SourcesDirectory)/fabric-cicd-v2/config/environments/dev.yml"
                Write-Host "dev.yml - OK"

          - task: PowerShell@2
            displayName: "Validate tst config"
            inputs:
              pwsh: true
              targetType: inline
              script: |
                . "$(Build.SourcesDirectory)/fabric-cicd-v2/src/helpers/Read-EnvironmentConfig.ps1"
                $null = Read-EnvironmentConfig -ConfigPath "$(Build.SourcesDirectory)/fabric-cicd-v2/config/environments/tst.yml"
                Write-Host "tst.yml - OK"

          - task: PowerShell@2
            displayName: "Validate prd config"
            inputs:
              pwsh: true
              targetType: inline
              script: |
                . "$(Build.SourcesDirectory)/fabric-cicd-v2/src/helpers/Read-EnvironmentConfig.ps1"
                $null = Read-EnvironmentConfig -ConfigPath "$(Build.SourcesDirectory)/fabric-cicd-v2/config/environments/prd.yml"
                Write-Host "prd.yml - OK"

  # ────────────────────────────────────────────────────────────────────────────
  # Stage: Deploy Dev
  # ────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_Dev
    displayName: "🚀 Deploy - dev"
    dependsOn: Validate
    condition: and(or(eq(variables['Build.SourceBranchName'], 'main'), eq('${{ parameters.whatIf }}', 'true')), eq('${{ parameters.deployDev }}', 'true'))
    jobs:
      - deployment: DeployDev
        displayName: "Deploy to dev"
        pool:
          ${{ if eq(parameters.devOpsManagedPoolUse, true) }}:
            name: $(devOpsPoolName)
          ${{ if eq(parameters.devOpsManagedPoolUse, false) }}:
            vmImage: ${{ parameters.devOpsAgentImage }}
        environment: fabric-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/install-prerequisites.yml

                - template: templates/deploy-environment.yml
                  parameters:
                    environment: dev
                    clientId: $(necp01-dev-fdev-spn-appId)
                    clientSecret: $(necp01-dev-fdev-spn-secret)
                    tenantId: $(fabricTenantId)
                    subscriptionId: $(subscriptionId)
                    templateFile: $(templateFile)
                    resourceGroupName: $(resourceGroupName)
                    connectedServiceName: $(connectedServiceName)

                - template: templates/validate-deployment.yml
                  parameters:
                    environment: dev

  # ────────────────────────────────────────────────────────────────────────────
  # Stage: Deploy Test
  # ────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_Tst
    displayName: "🚀 Deploy - tst"
    dependsOn: Deploy_Dev
    condition: and(or(eq(variables['Build.SourceBranchName'], 'main'), eq('${{ parameters.whatIf }}', 'true')), eq('${{ parameters.deployTst }}', 'true'))
    jobs:
      - deployment: DeployTst
        displayName: "Deploy to tst"
        pool:
          ${{ if eq(parameters.devOpsManagedPoolUse, true) }}:
            name: $(devOpsPoolName)
          ${{ if eq(parameters.devOpsManagedPoolUse, false) }}:
            vmImage: ${{ parameters.devOpsAgentImage }}
        environment: fabric-tst # add approval gate on this ADO environment
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/install-prerequisites.yml

                - template: templates/deploy-environment.yml
                  parameters:
                    environment: tst
                    clientId: $(necp01-tst-fdev-spn-appId)
                    clientSecret: $(necp01-tst-fdev-spn-secret)
                    tenantId: $(fabricTenantId)
                    subscriptionId: $(subscriptionId)
                    templateFile: $(templateFile)
                    resourceGroupName: $(resourceGroupName)
                    connectedServiceName: $(connectedServiceName)

                - template: templates/validate-deployment.yml
                  parameters:
                    environment: tst

  # ────────────────────────────────────────────────────────────────────────────
  # Stage: Deploy Production
  # ────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_Prd
    displayName: "🚀 Deploy - prd"
    dependsOn: Deploy_Tst
    condition: and(or(eq(variables['Build.SourceBranchName'], 'main'), eq('${{ parameters.whatIf }}', 'true')), eq('${{ parameters.deployPrd }}', 'true'))
    jobs:
      - deployment: DeployPrd
        displayName: "Deploy to prd"
        pool:
          ${{ if eq(parameters.devOpsManagedPoolUse, true) }}:
            name: $(devOpsPoolName)
          ${{ if eq(parameters.devOpsManagedPoolUse, false) }}:
            vmImage: ${{ parameters.devOpsAgentImage }}
        environment: fabric-prd # REQUIRED approval gate on this ADO environment
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/install-prerequisites.yml

                - template: templates/deploy-environment.yml
                  parameters:
                    environment: prd
                    clientId: $(necp01-prd-fdev-spn-appId)
                    clientSecret: $(necp01-prd-fdev-spn-secret)
                    tenantId: $(fabricTenantId)
                    subscriptionId: $(subscriptionId)
                    templateFile: $(templateFile)
                    resourceGroupName: $(resourceGroupName)
                    connectedServiceName: $(connectedServiceName)

                - template: templates/validate-deployment.yml
                  parameters:
                    environment: prd
